<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">vLLM V1 runtime architecture</title>
  <desc id="desc">A layered architecture diagram from client requests to API server, AsyncLLM, EngineCore, scheduler, KV cache manager, executor, GPU worker, model runner, model forward, structured output bitmask, sampler, and streaming output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <marker id="loopArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #8796a8; stroke-width: 2; rx: 8; }
      .accent { fill: #eef6ff; stroke: #4f86c6; }
      .core { fill: #f7f5ff; stroke: #7566c7; }
      .gpu { fill: #f0fdf8; stroke: #20a076; }
      .cache { fill: #fff7ed; stroke: #d97706; }
      .mask { fill: #fef2f2; stroke: #dc2626; }
      .text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 750; }
      .subtitle { font-size: 16px; fill: #526173; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; fill: #475569; }
      .tiny { font-size: 12px; fill: #64748b; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #0f766e; stroke-width: 2.5; fill: none; marker-end: url(#loopArrow); stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="text title" x="44" y="48">vLLM V1：一次请求穿过的运行时层次</text>
  <text class="text subtitle" x="44" y="76">模型权重只在 Model 层；调度、KV Cache、结构化输出和采样都属于推理运行时。</text>

  <rect class="lane" x="36" y="108" width="218" height="548" rx="12" />
  <rect class="lane" x="282" y="108" width="272" height="548" rx="12" />
  <rect class="lane" x="582" y="108" width="330" height="548" rx="12" />
  <rect class="lane" x="940" y="108" width="304" height="548" rx="12" />

  <text class="text label" x="62" y="140">Client</text>
  <text class="text label" x="310" y="140">API server process</text>
  <text class="text label" x="610" y="140">EngineCore process</text>
  <text class="text label" x="968" y="140">GPU worker process × N</text>

  <rect class="box accent" x="68" y="182" width="154" height="92" rx="8" />
  <text class="text label" x="92" y="214">OpenAI SDK</text>
  <text class="text small" x="88" y="242">messages / tools</text>
  <text class="text small" x="95" y="263">stream = true</text>

  <rect class="box accent" x="314" y="166" width="208" height="142" rx="8" />
  <text class="text label" x="344" y="198">Protocol layer</text>
  <text class="text small" x="342" y="226">validate request JSON</text>
  <text class="text small" x="342" y="249">chat template / tokenizer</text>
  <text class="text small" x="342" y="272">structured_outputs params</text>
  <text class="text code" x="342" y="294">EngineInput</text>

  <rect class="box accent" x="314" y="352" width="208" height="128" rx="8" />
  <text class="text label" x="350" y="384">AsyncLLM</text>
  <text class="text small" x="342" y="412">InputProcessor</text>
  <text class="text small" x="342" y="435">EngineCoreClient</text>
  <text class="text small" x="342" y="458">OutputProcessor</text>

  <rect class="box core" x="622" y="166" width="252" height="88" rx="8" />
  <text class="text label" x="684" y="198">EngineCore</text>
  <text class="text small" x="712" y="224">busy loop</text>
  <text class="text tiny" x="672" y="244">schedule → execute → sample</text>

  <rect class="box core" x="614" y="288" width="124" height="94" rx="8" />
  <text class="text label" x="638" y="319">Scheduler</text>
  <text class="text tiny" x="632" y="346">token budget</text>
  <text class="text tiny" x="629" y="365">waiting / running</text>

  <rect class="box cache" x="756" y="288" width="128" height="94" rx="8" />
  <text class="text label" x="772" y="319">KV Cache</text>
  <text class="text tiny" x="778" y="346">blocks / prefix</text>
  <text class="text tiny" x="782" y="365">evict / reuse</text>

  <rect class="box mask" x="614" y="414" width="270" height="96" rx="8" />
  <text class="text label" x="646" y="445">StructuredOutputManager</text>
  <text class="text small" x="644" y="473">JSON / regex / grammar → bitmask</text>
  <text class="text code" x="644" y="494">get_grammar_bitmask()</text>

  <rect class="box core" x="668" y="548" width="156" height="64" rx="8" />
  <text class="text label" x="706" y="580">Executor</text>
  <text class="text small" x="694" y="602">uniproc / multiproc / ray</text>

  <rect class="box gpu" x="972" y="166" width="238" height="98" rx="8" />
  <text class="text label" x="1030" y="198">GPU Worker</text>
  <text class="text small" x="1014" y="226">load weights</text>
  <text class="text small" x="1014" y="249">own device memory</text>

  <rect class="box gpu" x="972" y="296" width="238" height="138" rx="8" />
  <text class="text label" x="1030" y="328">ModelRunner</text>
  <text class="text small" x="1002" y="356">prepare tensors / positions</text>
  <text class="text small" x="1002" y="379">attention metadata</text>
  <text class="text small" x="1002" y="402">forward → hidden states</text>
  <text class="text code" x="1002" y="423">compute_logits()</text>

  <rect class="box gpu" x="972" y="468" width="108" height="88" rx="8" />
  <text class="text label" x="1002" y="500">Model</text>
  <text class="text tiny" x="991" y="526">torch.nn.Module</text>
  <text class="text tiny" x="1000" y="544">lm_head</text>

  <rect class="box mask" x="1100" y="468" width="110" height="88" rx="8" />
  <text class="text label" x="1124" y="500">Sampler</text>
  <text class="text tiny" x="1121" y="526">mask logits</text>
  <text class="text tiny" x="1125" y="544">choose token</text>

  <rect class="box accent" x="68" y="514" width="154" height="86" rx="8" />
  <text class="text label" x="99" y="546">Response</text>
  <text class="text small" x="91" y="573">delta chunks</text>
  <text class="text small" x="103" y="594">finish reason</text>

  <path class="arrow" d="M222 228 H314" />
  <path class="arrow" d="M418 308 V352" />
  <path class="arrow" d="M522 416 C562 416 574 210 622 210" />
  <path class="arrow" d="M748 254 V288" />
  <path class="arrow" d="M738 336 H756" />
  <path class="arrow" d="M748 382 V414" />
  <path class="arrow" d="M748 510 V548" />
  <path class="arrow" d="M824 580 C884 580 910 215 972 215" />
  <path class="arrow" d="M1091 264 V296" />
  <path class="arrow" d="M1056 434 V468" />
  <path class="arrow" d="M1080 512 H1100" />

  <path class="loop" d="M1155 556 C1155 630 788 686 676 620 C635 596 624 556 642 510" />
  <text class="text tiny" x="815" y="682">sampled token updates request state, grammar state, and KV allocation</text>

  <path class="arrow" d="M1100 512 C940 690 424 680 222 556" />
  <path class="arrow" d="M418 480 C390 548 284 552 222 556" />

  <text class="text tiny" x="52" y="702">Read left to right for request flow. The dashed loop is repeated once per generated token.</text>
  <text class="text tiny" x="52" y="726">DP / TP / PP can multiply EngineCore and worker processes; the single diagram shows one logical shard.</text>
</svg>
